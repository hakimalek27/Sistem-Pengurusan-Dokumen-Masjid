limit_req_zone $binary_remote_addr zone=diwan_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=diwan_auth:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=diwan_conn:10m;

server {
    listen 80;
    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/html/public;
    index index.php;
    client_max_body_size 30M;
    limit_conn diwan_conn 40;
    limit_req zone=diwan_per_ip burst=40 nodelay;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    location ~ ^/(app|admin)/login {
        limit_req zone=diwan_auth burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }
    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }
}
