x-app: &app
  build:
    context: .
    dockerfile: docker/Dockerfile
    target: app
  image: diwan-app:${DIWAN_IMAGE_TAG:-local}
  env_file: .env
  restart: unless-stopped
  volumes:
    - diwan_storage:/var/www/html/storage
    - ./.env:/var/www/html/.env:ro
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    meilisearch:
      condition: service_healthy
    clamav:
      condition: service_healthy

services:
  app:
    <<: *app

  worker:
    <<: *app
    command: ["php", "artisan", "horizon"]
    stop_grace_period: 60s

  scheduler:
    <<: *app
    command: ["php", "artisan", "schedule:work"]

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    image: diwan-web:${DIWAN_IMAGE_TAG:-local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      app:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - diwan_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - diwan_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  meilisearch:
    image: getmeili/meilisearch:${MEILI_IMAGE_TAG}
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - diwan_meili:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  clamav:
    image: clamav/clamav:1.4
    restart: unless-stopped
    expose:
      - "3310"
    volumes:
      - diwan_clamav:/var/lib/clamav
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 --wait >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 5

volumes:
  diwan_pgdata:
  diwan_redis:
  diwan_meili:
  diwan_clamav:
  diwan_storage:
